<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>signup</title>

    <!-- Bootstrap -->
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">

</head>
<body class="bg-light">

<div class="container d-flex align-items-center justify-content-center" style="min-height:100vh;">

    <div class="col-md-4">

        <div class="card p-4 shadow-sm border-0">

    <!-- Title -->
    <h2 class="text-center fw-bold mb-1">AI Resume Analyzer</h2>
            <p class="text-center text-muted mb-3">Create your account</p>

            <!-- Error Message -->
            {% if error %}
            <div class="alert alert-danger text-center py-2">
             {{ error }} 
             </div>
            {% endif %}  


    <!-- Form -->
    <form method="POST">
        {% csrf_token %}

        <div class="mb-3">
        <input type="text" name="username" placeholder="Enter username" class="form-control" required>
        </div>

        <div class="mb-3">
        <input type="password" name="password" placeholder="Enter password" class="form-control" required>
        </div>

        <div class="mb-3">
        <input type="password" name="confirm" placeholder="cofirm password" class="form-control" required>
        </div>

        <button type="submit" class="btn btn-success w-100">Signup</button>
    </form>

    <p class="text-center mt-3 mb-0">Already have an account? <a href="{% url 'login' %}">login</a></p>

    </div>
    </div>
    </div>
    

 
</body>
</html>
